<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="description" content="Perspective warp planner for Adobe Express" />
        <meta name="keywords" content="Adobe, Express, Add-On, warp, perspective" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Perspective Warp</title>
        <style>
            :root {
                color: #172033;
                background: #fafafa;
                font-family:
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-width: 320px;
                background: #fafafa;
            }

            button,
            input {
                font: inherit;
            }

            .app {
                display: flex;
                flex-direction: column;
                gap: 14px;
                max-width: 520px;
                margin: 0 auto;
                padding: 16px 14px;
            }

            .clear-btn {
                position: absolute;
                top: 8px;
                right: 8px;
                z-index: 110;
                min-height: 24px;
                padding: 4px 10px;
                border: 1px solid rgba(255, 255, 255, 0.35);
                border-radius: 8px;
                background: rgba(255, 255, 255, 0.35);
                color: rgba(51, 65, 85, 0.85);
                font-size: 11px;
                font-weight: 600;
                cursor: pointer;
                pointer-events: auto;
                transition: background 0.15s ease, border-color 0.15s ease;
            }

            .clear-btn:hover {
                background: rgba(255, 255, 255, 0.72);
                border-color: rgba(255, 255, 255, 0.6);
            }

            .clear-btn:active {
                background: rgba(255, 255, 255, 0.55);
            }

            .upload-grid {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 12px;
            }

            .field {
                display: flex;
                min-width: 0;
                flex-direction: column;
                gap: 6px;
            }

            .field-label-row {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                min-height: 18px;
            }

            .field-label-row .label {
                margin: 0;
                white-space: nowrap;
            }

            .toggle-switch {
                position: relative;
                display: inline-flex;
                flex-shrink: 0;
                align-items: center;
                cursor: pointer;
            }

            .toggle-switch input {
                position: absolute;
                width: 1px;
                height: 1px;
                overflow: hidden;
                clip: rect(0, 0, 0, 0);
                white-space: nowrap;
            }

            .toggle-track {
                position: relative;
                display: block;
                width: 32px;
                height: 18px;
                border-radius: 999px;
                background: #d1d5db;
                transition: background 0.15s ease;
            }

            .toggle-track::after {
                content: "";
                position: absolute;
                top: 2px;
                left: 2px;
                width: 14px;
                height: 14px;
                border-radius: 999px;
                background: #ffffff;
                box-shadow: 0 1px 2px rgba(15, 23, 42, 0.18);
                transition: transform 0.15s ease;
            }

            .toggle-switch input:checked + .toggle-track {
                background: #2563eb;
            }

            .toggle-switch input:checked + .toggle-track::after {
                transform: translateX(14px);
            }

            .toggle-switch input:focus-visible + .toggle-track {
                outline: 2px solid rgba(37, 99, 235, 0.35);
                outline-offset: 2px;
            }

            .toggle-switch input:disabled + .toggle-track {
                opacity: 0.45;
                cursor: not-allowed;
            }

            .upload-grid .label {
                padding-left: 0;
            }

            .label {
                color: #6b7280;
                font-size: 11px;
                font-weight: 650;
                letter-spacing: 0.01em;
            }

            .file-input {
                position: absolute;
                width: 1px;
                height: 1px;
                overflow: hidden;
                clip: rect(0, 0, 0, 0);
                white-space: nowrap;
            }

            .upload-button {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-height: 34px;
                width: 100%;
                padding: 8px 12px;
                border: 1px solid #e5e7eb;
                border-radius: 12px;
                background: #ffffff;
                color: #374151;
                font-size: 12px;
                font-weight: 680;
                cursor: pointer;
                transition:
                    background 0.15s ease,
                    border-color 0.15s ease,
                    color 0.15s ease;
            }

            .upload-button:hover {
                border-color: #d1d5db;
                background: #f9fafb;
            }

            .upload-button.is-uploaded {
                border-color: #86efac;
                background: #dcfce7;
                color: #166534;
            }

            .view-window {
                position: relative;
                width: 100%;
                aspect-ratio: 1 / 1;
                max-width: 480px;
                margin: 0 auto;
                overflow: hidden;
                border: 2px solid #1f2937;
                border-radius: 10px;
                background:
                    linear-gradient(135deg, rgba(148, 163, 184, 0.25) 25%, transparent 25%) 0 0 / 24px 24px,
                    linear-gradient(315deg, rgba(148, 163, 184, 0.25) 25%, transparent 25%) 0 0 / 24px 24px,
                    #e2e8f0;
                touch-action: none;
                user-select: none;
            }

            #viewPan,
            #viewZoom {
                position: absolute;
                inset: 0;
                transform-origin: 0 0;
            }

            #viewZoom {
                width: 100%;
                height: 100%;
                cursor: default;
            }

            #viewZoom:active {
                cursor: default;
            }

            .ref-image {
                position: absolute;
                inset: 0;
                z-index: 10;
                width: 100%;
                height: 100%;
                object-fit: contain;
                -webkit-user-drag: none;
            }

            #grid-overlay {
                position: absolute;
                inset: 0;
                z-index: 15;
                width: 100%;
                height: 100%;
                pointer-events: none;
            }

            #grid-overlay line {
                stroke: rgba(15, 23, 42, 0.2);
                stroke-width: 1;
            }

            #focus-container {
                position: absolute;
                inset: 0;
                z-index: 20;
                transform-origin: 0 0;
                pointer-events: none;
            }

            #focusImg {
                display: block;
                width: 100%;
                height: 100%;
                object-fit: fill;
                -webkit-user-drag: none;
            }

            .handle,
            .handle-center {
                position: absolute;
                border-radius: 999px;
                transform: translate(-50%, -50%);
                touch-action: none;
            }

            .handle {
                z-index: 100;
                width: 14px;
                height: 14px;
                border: 2px solid #2563eb;
                background: rgba(255, 255, 255, 0.12);
                cursor: grab;
            }

            .handle:hover {
                border-color: #ef4444;
                background: rgba(255, 255, 255, 0.2);
                transform: translate(-50%, -50%) scale(1.15);
            }

            .handle:active {
                cursor: grabbing;
            }

            .handle-center {
                z-index: 101;
                width: 18px;
                height: 18px;
                border: 2px solid #ffffff;
                background: #ec4899;
                cursor: move;
            }

            .handle-center:hover {
                background: #db2777;
                transform: translate(-50%, -50%) scale(1.15);
            }

            .handle-center:active {
                cursor: move;
            }

            .edge-handle {
                display: none;
                position: absolute;
                z-index: 102;
                width: 28px;
                height: 10px;
                border: 2px solid #ffffff;
                border-radius: 999px;
                background: #2563eb;
                transform: translate(-50%, -50%);
                transform-origin: center center;
                touch-action: none;
                cursor: grab;
            }

            .edge-handle:hover {
                background: #ef4444;
            }

            .edge-handle:active {
                cursor: grabbing;
            }

            .controls {
                display: flex;
                flex-direction: column;
                gap: 10px;
                padding: 12px;
                border: 1px solid #e5e7eb;
                border-radius: 14px;
                background: #ffffff;
            }

            .mode-tabs {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 4px;
                padding: 4px;
                border: 1px solid #eeeeee;
                border-radius: 14px;
                background: #f7f7f7;
            }

            .mode-tab {
                min-height: 30px;
                border: 0;
                border-radius: 10px;
                background: transparent;
                color: #6b7280;
                font-size: 11px;
                font-weight: 650;
                cursor: pointer;
                transition:
                    background 0.15s ease,
                    color 0.15s ease;
            }

            .mode-tab.is-active {
                background: #ffffff;
                color: #111827;
            }

            .control-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 10px;
                flex-wrap: wrap;
            }

            .control-row + .control-row {
                padding-top: 8px;
                border-top: 1px solid #f1f5f9;
            }

            .range {
                width: min(180px, 52%);
                accent-color: #2563eb;
            }

            body[data-mode="tilt"] .warp-only,
            body[data-mode="sides"] .warp-only {
                display: none;
            }

            body[data-mode="tilt"] .handle,
            body[data-mode="sides"] .handle {
                display: none;
            }

            body[data-mode="tilt"] .edge-handle,
            body[data-mode="sides"] .edge-handle {
                display: block;
            }

            .checkbox-label {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                color: #4b5563;
                font-size: 12px;
                font-weight: 620;
            }

            .button-row {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            .button {
                min-height: 34px;
                padding: 7px 10px;
                border: 1px solid #e5e7eb;
                border-radius: 12px;
                background: #ffffff;
                color: #374151;
                font-size: 12px;
                font-weight: 650;
                cursor: pointer;
                transition:
                    background 0.15s ease,
                    border-color 0.15s ease,
                    color 0.15s ease;
            }

            .button:hover:not(:disabled) {
                background: #f9fafb;
            }

            .button-primary {
                border-color: #111827;
                background: #111827;
                color: #ffffff;
            }

            .button-primary:hover:not(:disabled) {
                border-color: #1f2937;
                background: #1f2937;
            }

            .button:disabled {
                border-color: #cbd5e1;
                background: #e2e8f0;
                color: #94a3b8;
                cursor: not-allowed;
            }

            .stats {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px 10px;
                padding: 10px;
                border: 1px solid #eeeeee;
                border-radius: 10px;
                background: #fafafa;
                color: #475569;
                font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
                font-size: 11px;
            }

            .advanced-controls {
                padding-top: 8px;
                border-top: 1px solid #f1f5f9;
            }

            .advanced-controls summary {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 8px;
                min-height: 32px;
                color: #6b7280;
                font-size: 11px;
                font-weight: 650;
                cursor: pointer;
                list-style: none;
                user-select: none;
            }

            .advanced-controls summary::-webkit-details-marker {
                display: none;
            }

            .advanced-controls summary::after {
                content: "";
                width: 7px;
                height: 7px;
                border-right: 2px solid currentColor;
                border-bottom: 2px solid currentColor;
                transform: rotate(45deg);
                transition: transform 0.15s ease;
            }

            .advanced-controls[open] summary::after {
                transform: rotate(225deg);
            }

            .advanced-controls summary:hover {
                color: #334155;
            }

            .point-field {
                display: grid;
                grid-template-columns: auto minmax(0, 1fr) minmax(0, 1fr);
                align-items: center;
                gap: 4px;
                min-width: 0;
            }

            .point-label {
                color: #334155;
                font-weight: 800;
            }

            .coord-input {
                width: 100%;
                min-width: 0;
                padding: 4px;
                border: 1px solid #cbd5e1;
                border-radius: 6px;
                background: #ffffff;
                color: #334155;
                font-family: inherit;
                font-size: 11px;
            }

            .coord-input:focus {
                border-color: #5258e4;
                outline: 2px solid rgba(82, 88, 228, 0.18);
            }
        </style>
    </head>
    <body>
        <main class="app">
            <section class="upload-grid" aria-label="Image uploads">
                <div class="field">
                    <div class="field-label-row">
                        <label class="label" for="focusUpload">Focus Image</label>
                    </div>
                    <label class="upload-button" for="focusUpload">
                        <span class="upload-button-text">Choose Image</span>
                    </label>
                    <input class="file-input" type="file" id="focusUpload" accept="image/*" />
                </div>
                <div class="field">
                    <div class="field-label-row">
                        <label class="label" for="refUpload">Background Ref</label>
                        <label class="toggle-switch" for="refToggle" title="Show background reference">
                            <input type="checkbox" id="refToggle" checked />
                            <span class="toggle-track" aria-hidden="true"></span>
                        </label>
                    </div>
                    <label class="upload-button" for="refUpload">
                        <span class="upload-button-text">Choose Image</span>
                    </label>
                    <input class="file-input" type="file" id="refUpload" accept="image/*" />
                </div>
            </section>

            <section class="view-window" id="viewport" aria-label="Warp preview">
                <button id="clearBtn" class="clear-btn" type="button">Clear</button>
                <div id="viewPan">
                    <div id="viewZoom">
                        <img class="ref-image" id="refImg" alt="Reference" draggable="false" />

                        <svg id="grid-overlay" aria-hidden="true"></svg>

                        <div id="focus-container">
                            <img id="focusImg" alt="Focus" draggable="false" />
                        </div>

                        <div id="h0" class="handle" data-index="0" title="Top left"></div>
                        <div id="h1" class="handle" data-index="1" title="Top right"></div>
                        <div id="h2" class="handle" data-index="2" title="Bottom right"></div>
                        <div id="h3" class="handle" data-index="3" title="Bottom left"></div>
                        <div class="edge-handle" data-edge="top" title="Drag top edge"></div>
                        <div class="edge-handle" data-edge="right" title="Drag right edge"></div>
                        <div class="edge-handle" data-edge="bottom" title="Drag bottom edge"></div>
                        <div class="edge-handle" data-edge="left" title="Drag left edge"></div>
                        <div id="centerGrab" class="handle-center" title="Drag to move the whole focus quad"></div>
                    </div>
                </div>
            </section>

            <section class="controls" aria-label="Warp controls">
                <div class="mode-tabs" role="tablist" aria-label="Transform mode">
                    <button class="mode-tab is-active" type="button" data-mode="warp" role="tab" aria-selected="true">Perspective</button>
                    <button class="mode-tab" type="button" data-mode="tilt" role="tab" aria-selected="false">Free Tilt</button>
                    <button class="mode-tab" type="button" data-mode="sides" role="tab" aria-selected="false">Warp (Sides)</button>
                </div>

                <div class="control-row">
                    <label class="label" for="opacityCtrl">Focus Opacity</label>
                    <input class="range" type="range" id="opacityCtrl" min="0" max="1" step="0.01" value="0.72" />
                </div>

                <div class="control-row">
                    <label class="checkbox-label warp-only" for="gridSnap">
                        <input type="checkbox" id="gridSnap" />
                        Grid Snap
                    </label>
                    <button id="resetBtn" class="button" type="button">Reset</button>
                </div>

                <div class="button-row">
                    <button id="downloadBtn" class="button" type="button">Download PNG</button>
                    <button id="addToDocumentBtn" class="button button-primary" type="button" disabled>Add to Page</button>
                </div>

                <details class="advanced-controls warp-only">
                    <summary>Corner coordinates (Precision Adjustments)</summary>
                    <div class="stats" aria-label="Warp values">
                        <label class="point-field">
                            <span class="point-label">TL</span>
                            <input class="coord-input" type="number" inputmode="numeric" data-index="0" data-axis="x" aria-label="Top left x" />
                            <input class="coord-input" type="number" inputmode="numeric" data-index="0" data-axis="y" aria-label="Top left y" />
                        </label>
                        <label class="point-field">
                            <span class="point-label">TR</span>
                            <input class="coord-input" type="number" inputmode="numeric" data-index="1" data-axis="x" aria-label="Top right x" />
                            <input class="coord-input" type="number" inputmode="numeric" data-index="1" data-axis="y" aria-label="Top right y" />
                        </label>
                        <label class="point-field">
                            <span class="point-label">BL</span>
                            <input class="coord-input" type="number" inputmode="numeric" data-index="3" data-axis="x" aria-label="Bottom left x" />
                            <input class="coord-input" type="number" inputmode="numeric" data-index="3" data-axis="y" aria-label="Bottom left y" />
                        </label>
                        <label class="point-field">
                            <span class="point-label">BR</span>
                            <input class="coord-input" type="number" inputmode="numeric" data-index="2" data-axis="x" aria-label="Bottom right x" />
                            <input class="coord-input" type="number" inputmode="numeric" data-index="2" data-axis="y" aria-label="Bottom right y" />
                        </label>
                    </div>
                </details>
            </section>
        </main>

        <script type="module" src="add-on-console-override.js"></script>
        <script type="module" src="index.js"></script>
    </body>
</html>
