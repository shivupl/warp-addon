<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="description" content="Perspective warp planner for Adobe Express" />
        <meta name="keywords" content="Adobe, Express, Add-On, warp, perspective" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Perspective Warp</title>
        <style>
            :root {
                color: #172033;
                background: #fafafa;
                font-family:
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-width: 320px;
                background: #fafafa;
            }

            button,
            input {
                font: inherit;
            }

            .app {
                display: flex;
                flex-direction: column;
                gap: 14px;
                max-width: 520px;
                margin: 0 auto;
                padding: 16px 14px;
            }

            .clear-btn {
                position: absolute;
                top: 8px;
                right: 8px;
                z-index: 110;
                min-height: 24px;
                padding: 4px 10px;
                border: 1px solid rgba(255, 255, 255, 0.35);
                border-radius: 8px;
                background: rgba(255, 255, 255, 0.35);
                color: rgba(51, 65, 85, 0.85);
                font-size: 11px;
                font-weight: 600;
                cursor: pointer;
                pointer-events: auto;
                transition: background 0.15s ease, border-color 0.15s ease;
            }

            .clear-btn[hidden] {
                display: none !important;
            }

            .clear-btn:hover {
                background: rgba(255, 255, 255, 0.72);
                border-color: rgba(255, 255, 255, 0.6);
            }

            .clear-btn:active {
                background: rgba(255, 255, 255, 0.55);
            }

            .frame-grid-snap {
                position: absolute;
                top: 8px;
                left: 8px;
                z-index: 110;
                display: inline-flex;
                align-items: center;
                gap: 6px;
                min-height: 24px;
                padding: 4px 10px;
                border: 1px solid rgba(255, 255, 255, 0.35);
                border-radius: 8px;
                background: rgba(255, 255, 255, 0.35);
                color: rgba(51, 65, 85, 0.85);
                font-size: 11px;
                font-weight: 600;
                cursor: pointer;
                pointer-events: auto;
                transition: background 0.15s ease, border-color 0.15s ease;
            }

            .frame-grid-snap:hover {
                background: rgba(255, 255, 255, 0.72);
                border-color: rgba(255, 255, 255, 0.6);
            }

            .frame-grid-snap input {
                width: 12px;
                height: 12px;
                margin: 0;
                accent-color: #475569;
                cursor: pointer;
            }

            .upload-grid {
                display: grid;
                grid-template-columns: 1fr;
                gap: 12px;
                max-width: 480px;
                margin: 0 auto;
            }

            .field {
                display: flex;
                min-width: 0;
                flex-direction: column;
                gap: 6px;
            }

            .field-label-row {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                min-height: 18px;
            }

            .field-label-row .label {
                margin: 0;
                white-space: nowrap;
            }

            .toggle-switch {
                position: relative;
                display: inline-flex;
                flex-shrink: 0;
                align-items: center;
                cursor: pointer;
            }

            .toggle-switch input {
                position: absolute;
                width: 1px;
                height: 1px;
                overflow: hidden;
                clip: rect(0, 0, 0, 0);
                white-space: nowrap;
            }

            .toggle-track {
                position: relative;
                display: block;
                width: 32px;
                height: 18px;
                border-radius: 999px;
                background: #d1d5db;
                transition: background 0.15s ease;
            }

            .toggle-track::after {
                content: "";
                position: absolute;
                top: 2px;
                left: 2px;
                width: 14px;
                height: 14px;
                border-radius: 999px;
                background: #ffffff;
                box-shadow: 0 1px 2px rgba(15, 23, 42, 0.18);
                transition: transform 0.15s ease;
            }

            .toggle-switch input:checked + .toggle-track {
                background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            }

            .toggle-switch input:checked + .toggle-track::after {
                transform: translateX(14px);
            }

            .toggle-switch input:focus-visible + .toggle-track {
                outline: 2px solid rgba(82, 88, 228, 0.35);
                outline-offset: 2px;
            }

            .toggle-switch input:disabled + .toggle-track {
                opacity: 0.45;
                cursor: not-allowed;
            }

            .upload-grid .label {
                padding-left: 0;
            }

            .label {
                color: #6b7280;
                font-size: 11px;
                font-weight: 650;
                letter-spacing: 0.01em;
            }

            .file-input {
                position: absolute;
                width: 1px;
                height: 1px;
                overflow: hidden;
                clip: rect(0, 0, 0, 0);
                white-space: nowrap;
            }

            .upload-button {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-height: 34px;
                width: 100%;
                padding: 8px 12px;
                border: 1px solid #e5e7eb;
                border-radius: 12px;
                background: #ffffff;
                color: #374151;
                font-size: 12px;
                font-weight: 680;
                cursor: pointer;
                transition:
                    background 0.15s ease,
                    border-color 0.15s ease,
                    color 0.15s ease;
            }

            .upload-button:hover {
                border-color: #d1d5db;
                background: #f9fafb;
            }

            .upload-button.is-uploaded {
                border-color: #86efac;
                background: #dcfce7;
                color: #166534;
            }

            .view-window {
                position: relative;
                width: 100%;
                aspect-ratio: 1 / 1;
                max-width: 480px;
                margin: 0 auto;
                overflow: hidden;
                border: 2px solid #1f2937;
                border-radius: 10px;
                background:
                    linear-gradient(135deg, rgba(148, 163, 184, 0.25) 25%, transparent 25%) 0 0 / 24px 24px,
                    linear-gradient(315deg, rgba(148, 163, 184, 0.25) 25%, transparent 25%) 0 0 / 24px 24px,
                    #e2e8f0;
                touch-action: none;
                user-select: none;
            }

            #viewPan,
            #viewZoom {
                position: absolute;
                inset: 0;
                transform-origin: 0 0;
            }

            #viewZoom {
                width: 100%;
                height: 100%;
                cursor: default;
            }

            #viewZoom:active {
                cursor: default;
            }

            .ref-image {
                position: absolute;
                inset: 0;
                z-index: 10;
                width: 100%;
                height: 100%;
                object-fit: contain;
                -webkit-user-drag: none;
            }

            #grid-overlay {
                position: absolute;
                inset: 0;
                z-index: 15;
                width: 100%;
                height: 100%;
                pointer-events: none;
            }

            #grid-overlay line {
                stroke: rgba(15, 23, 42, 0.2);
                stroke-width: 1;
            }

            #focus-container {
                position: absolute;
                inset: 0;
                z-index: 20;
                transform-origin: 0 0;
                pointer-events: none;
            }

            #focus-container.is-upload-target {
                pointer-events: auto;
            }

            .focus-upload-prompt {
                position: absolute;
                inset: 0;
                z-index: 2;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 16px;
                pointer-events: auto;
                cursor: pointer;
            }

            .focus-upload-prompt[hidden] {
                display: none !important;
            }

            .focus-upload-icon {
                width: 52px;
                height: 52px;
                color: rgba(255, 255, 255, 0.88);
                transition:
                    color 0.28s cubic-bezier(0.4, 0, 0.2, 1),
                    transform 0.28s cubic-bezier(0.4, 0, 0.2, 1),
                    opacity 0.28s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .focus-upload-btn {
                min-height: 36px;
                padding: 8px 20px;
                border: 1px solid rgba(255, 255, 255, 0.35);
                border-radius: 8px;
                background: rgba(255, 255, 255, 0.35);
                color: rgba(255, 255, 255, 0.94);
                font-size: 14px;
                font-weight: 600;
                font-family: inherit;
                line-height: 1.2;
                pointer-events: none;
                transition:
                    background 0.28s cubic-bezier(0.4, 0, 0.2, 1),
                    border-color 0.28s cubic-bezier(0.4, 0, 0.2, 1),
                    color 0.28s cubic-bezier(0.4, 0, 0.2, 1),
                    transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .focus-upload-prompt:hover .focus-upload-icon {
                color: rgba(255, 255, 255, 1);
                transform: translateY(-2px);
            }

            .focus-upload-prompt:hover .focus-upload-btn {
                background: rgba(255, 255, 255, 0.72);
                border-color: rgba(255, 255, 255, 0.6);
                transform: translateY(-1px);
            }

            .focus-upload-prompt:active .focus-upload-icon {
                transform: translateY(0);
            }

            .focus-upload-prompt:active .focus-upload-btn {
                background: rgba(255, 255, 255, 0.55);
                transform: translateY(0);
            }

            #focusImg {
                display: block;
                width: 100%;
                height: 100%;
                object-fit: fill;
                -webkit-user-drag: none;
            }

            .handle,
            .handle-center {
                position: absolute;
                border-radius: 999px;
                transform: translate(-50%, -50%);
                touch-action: none;
            }

            .handle {
                z-index: 100;
                width: 14px;
                height: 14px;
                border: 2px solid #2563eb;
                background: rgba(255, 255, 255, 0.12);
                cursor: grab;
            }

            .handle:hover {
                border-color: #ef4444;
                background: rgba(255, 255, 255, 0.2);
                transform: translate(-50%, -50%) scale(1.15);
            }

            .handle:active {
                cursor: grabbing;
            }

            .handle-center {
                z-index: 101;
                width: 18px;
                height: 18px;
                border: 2px solid #ffffff;
                background: #ec4899;
                cursor: move;
            }

            .handle-center:hover {
                background: #db2777;
                transform: translate(-50%, -50%) scale(1.15);
            }

            .handle-center:active {
                cursor: move;
            }

            .edge-handle {
                display: none;
                position: absolute;
                z-index: 102;
                width: 28px;
                height: 10px;
                border: 2px solid #ffffff;
                border-radius: 999px;
                background: #2563eb;
                transform: translate(-50%, -50%);
                transform-origin: center center;
                touch-action: none;
                cursor: grab;
            }

            .edge-handle:hover {
                background: #ef4444;
            }

            .edge-handle:active {
                cursor: grabbing;
            }

            .tilt-gizmo {
                position: absolute;
                inset: 0;
                z-index: 105;
                overflow: visible;
                pointer-events: none;
            }

            .tilt-gizmo[hidden] {
                display: none !important;
            }

            .tilt-gizmo .tilt-axis {
                pointer-events: auto;
                cursor: grab;
            }

            .tilt-gizmo .tilt-axis:active {
                cursor: grabbing;
            }

            .tilt-gizmo .tilt-axis-pitch {
                cursor: ns-resize;
            }

            .tilt-gizmo .tilt-axis-yaw {
                cursor: ew-resize;
            }

            .tilt-axis-line,
            .tilt-arc,
            .tilt-horizon {
                fill: none;
                stroke: rgba(255, 255, 255, 0.95);
                stroke-width: 2.5;
                stroke-linecap: round;
                stroke-linejoin: round;
                filter: drop-shadow(0 1px 2px rgba(15, 23, 42, 0.45));
                pointer-events: none;
            }

            .tilt-horizon {
                stroke: rgba(255, 255, 255, 0.55);
                stroke-width: 1.5;
                stroke-dasharray: 6 5;
            }

            .tilt-hit-area {
                fill: transparent;
                stroke: none;
            }

            .tilt-axis.is-active .tilt-axis-line,
            .tilt-axis.is-active .tilt-arc {
                stroke: #fbbf24;
            }

            .tilt-angle-label {
                fill: rgba(255, 255, 255, 0.95);
                font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
                font-size: 12px;
                font-weight: 700;
                text-anchor: middle;
                pointer-events: none;
                filter: drop-shadow(0 1px 2px rgba(15, 23, 42, 0.5));
            }

            .tilt-controls {
                display: none;
                flex-direction: column;
                gap: 10px;
                padding-bottom: 10px;
                border-bottom: 1px solid #f1f5f9;
            }

            body[data-mode="tilt"] .tilt-controls {
                display: flex;
            }

            .tilt-control-row {
                display: grid;
                grid-template-columns: auto minmax(0, 1fr) auto;
                align-items: center;
                gap: 10px;
            }

            .tilt-control-row .label {
                margin: 0;
                min-width: 52px;
                white-space: nowrap;
            }

            .tilt-control-row .range {
                width: 100%;
                min-width: 0;
                accent-color: #7c3aed;
            }

            .tilt-angle-input {
                width: 52px;
                min-width: 52px;
                padding: 4px 6px;
                border: 1px solid #cbd5e1;
                border-radius: 6px;
                background: #ffffff;
                color: #334155;
                font-family: inherit;
                font-size: 11px;
                font-weight: 700;
                font-variant-numeric: tabular-nums;
                text-align: center;
            }

            .tilt-angle-input:focus {
                border-color: #5258e4;
                outline: 2px solid rgba(82, 88, 228, 0.18);
            }

            .controls {
                display: flex;
                flex-direction: column;
                gap: 10px;
                padding: 12px;
                border: 1px solid #e5e7eb;
                border-radius: 14px;
                background: #ffffff;
            }

            .mode-tabs {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 4px;
                width: 100%;
                max-width: 480px;
                margin: 0 auto;
                padding: 4px;
                border: 1px solid #eeeeee;
                border-radius: 14px;
                background: #f7f7f7;
            }

            .mode-tab {
                min-height: 30px;
                border: 0;
                border-radius: 10px;
                background: transparent;
                color: #6b7280;
                font-size: 11px;
                font-weight: 650;
                cursor: pointer;
                transition:
                    background 0.15s ease,
                    color 0.15s ease;
            }

            .mode-tab.is-active {
                background: #ffffff;
                color: #111827;
            }

            .control-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 10px;
                flex-wrap: wrap;
            }

            .control-row:not([hidden]) + .control-row {
                padding-top: 8px;
                border-top: 1px solid #f1f5f9;
            }

            .opacity-collapse {
                display: grid;
                grid-template-rows: 0fr;
                transition: grid-template-rows 0.28s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .opacity-collapse.is-open {
                grid-template-rows: 1fr;
            }

            .opacity-collapse-inner {
                min-height: 0;
                overflow: hidden;
            }

            .opacity-collapse.is-open + .control-row {
                margin-top: 12px;
                padding-top: 12px;
                border-top: 1px solid #f1f5f9;
                transition:
                    margin-top 0.28s cubic-bezier(0.4, 0, 0.2, 1),
                    padding-top 0.28s cubic-bezier(0.4, 0, 0.2, 1),
                    border-color 0.28s ease;
            }

            .control-row.opacity-row {
                opacity: 0;
                transform: translateY(-4px);
                transition:
                    opacity 0.22s ease,
                    transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .controls-pair-layout {
                display: flex;
                flex-direction: column;
                gap: 0;
            }

            .controls-pair-row {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                gap: 24px;
            }

            .control-row-tools.controls-pair-row {
                align-items: center;
            }

            .opacity-collapse.is-open .opacity-row {
                opacity: 1;
                transform: translateY(0);
            }

            .opacity-field,
            .ref-upload-field {
                display: flex;
                flex-direction: column;
                gap: 6px;
                flex: 0 0 auto;
                min-width: 0;
            }

            .ref-upload-field {
                align-items: center;
            }

            .opacity-row .label,
            .ref-upload-field .label {
                margin: 0;
                min-height: 14px;
                white-space: nowrap;
                line-height: 1.2;
            }

            .ref-upload-field .label {
                text-align: center;
            }

            .control-input-shell {
                display: flex;
                align-items: center;
                min-height: 28px;
                width: 100%;
            }

            .opacity-row .range {
                --range-progress: 72%;
                -webkit-appearance: none;
                appearance: none;
                width: 100%;
                min-width: 0;
                height: 6px;
                margin: 0;
                border-radius: 999px;
                background-color: #e5e7eb;
                background-image: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
                background-size: var(--range-progress) 100%;
                background-repeat: no-repeat;
                cursor: pointer;
            }

            .opacity-row .range::-webkit-slider-runnable-track {
                height: 6px;
                border-radius: 999px;
                background: transparent;
            }

            .opacity-row .range::-webkit-slider-thumb {
                -webkit-appearance: none;
                width: 14px;
                height: 14px;
                margin-top: -4px;
                border: 2px solid #ffffff;
                border-radius: 50%;
                background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
                box-shadow: 0 1px 4px rgba(82, 88, 228, 0.35);
                cursor: pointer;
            }

            .opacity-row .range::-moz-range-track {
                height: 6px;
                border: 0;
                border-radius: 999px;
                background: #e5e7eb;
            }

            .opacity-row .range::-moz-range-progress {
                height: 6px;
                border-radius: 999px;
                background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            }

            .opacity-row .range::-moz-range-thumb {
                width: 14px;
                height: 14px;
                border: 2px solid #ffffff;
                border-radius: 50%;
                background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
                box-shadow: 0 1px 4px rgba(82, 88, 228, 0.35);
                cursor: pointer;
            }

            .opacity-row .upload-button {
                width: 100%;
                min-height: 28px;
                padding: 6px 14px;
                font-size: 11px;
                white-space: nowrap;
            }

            @media (prefers-reduced-motion: reduce) {
                .opacity-collapse,
                .control-row.opacity-row,
                .opacity-collapse.is-open + .control-row {
                    transition: none;
                }
            }

            .range {
                width: min(180px, 52%);
                accent-color: #2563eb;
            }

            body[data-mode="tilt"] .warp-only,
            body[data-mode="sides"] .warp-only {
                display: none;
            }

            body[data-mode="tilt"] .handle,
            body[data-mode="sides"] .handle {
                display: none;
            }

            body[data-mode="sides"] .edge-handle {
                display: block;
            }

            .control-row-tools {
                gap: 10px;
            }

            .ref-toggle-row {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                flex: 0 0 auto;
            }

            .ref-toggle-row .label {
                margin: 0;
                white-space: nowrap;
            }

            .control-row-tools .button-reset {
                flex-shrink: 0;
            }

            .button-reset {
                min-height: 28px;
                padding: 4px 12px;
                font-size: 11px;
                white-space: nowrap;
            }

            .checkbox-label {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                color: #4b5563;
                font-size: 12px;
                font-weight: 620;
            }

            .button-row {
                display: grid;
                grid-template-columns: 1fr;
            }

            .button {
                min-height: 34px;
                padding: 7px 10px;
                border: 1px solid #e5e7eb;
                border-radius: 12px;
                background: #ffffff;
                color: #374151;
                font-size: 12px;
                font-weight: 650;
                cursor: pointer;
                transition:
                    background 0.15s ease,
                    border-color 0.15s ease,
                    color 0.15s ease;
            }

            .button:hover:not(:disabled):not(.button-primary) {
                background: #f9fafb;
            }

            .button-primary {
                border-color: transparent;
                background-color: transparent;
                background-image: linear-gradient(
                    135deg,
                    #2563eb 0%,
                    #7c3aed 50%,
                    #2563eb 100%
                );
                background-size: 200% 200%;
                background-position: 0% 50%;
                color: #ffffff;
                transition:
                    background-position 0.6s ease,
                    border-color 0.15s ease,
                    color 0.15s ease;
            }

            .button-primary:hover:not(:disabled) {
                border-color: transparent;
                background-color: transparent;
                background-image: linear-gradient(
                    135deg,
                    #2563eb 0%,
                    #7c3aed 50%,
                    #2563eb 100%
                );
                background-size: 200% 200%;
                background-position: 100% 50%;
                color: #ffffff;
            }

            @media (prefers-reduced-motion: reduce) {
                .button-primary {
                    transition: none;
                }
            }

            .button:disabled {
                border-color: #cbd5e1;
                background: #e2e8f0;
                color: #94a3b8;
                cursor: not-allowed;
            }

            .stats {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px 10px;
                padding: 10px;
                border: 1px solid #eeeeee;
                border-radius: 10px;
                background: #fafafa;
                color: #475569;
                font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
                font-size: 11px;
            }

            .advanced-controls {
                padding-top: 8px;
                border-top: 1px solid #f1f5f9;
            }

            .advanced-controls summary {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 8px;
                min-height: 32px;
                color: #6b7280;
                font-size: 11px;
                font-weight: 650;
                cursor: pointer;
                list-style: none;
                user-select: none;
            }

            .advanced-controls summary::-webkit-details-marker {
                display: none;
            }

            .advanced-controls summary::after {
                content: "";
                width: 7px;
                height: 7px;
                border-right: 2px solid currentColor;
                border-bottom: 2px solid currentColor;
                transform: rotate(45deg);
                transition: transform 0.15s ease;
            }

            .advanced-controls[open] summary::after {
                transform: rotate(225deg);
            }

            .advanced-controls summary:hover {
                color: #334155;
            }

            .point-field {
                display: grid;
                grid-template-columns: auto minmax(0, 1fr) minmax(0, 1fr);
                align-items: center;
                gap: 4px;
                min-width: 0;
            }

            .point-label {
                color: #334155;
                font-weight: 800;
            }

            .coord-input {
                width: 100%;
                min-width: 0;
                padding: 4px;
                border: 1px solid #cbd5e1;
                border-radius: 6px;
                background: #ffffff;
                color: #334155;
                font-family: inherit;
                font-size: 11px;
            }

            .coord-input:focus {
                border-color: #5258e4;
                outline: 2px solid rgba(82, 88, 228, 0.18);
            }
        </style>
    </head>
    <body>
        <main class="app">
            <div class="mode-tabs" role="tablist" aria-label="Transform mode">
                <button class="mode-tab is-active" type="button" data-mode="warp" role="tab" aria-selected="true">Perspective</button>
                <button class="mode-tab" type="button" data-mode="tilt" role="tab" aria-selected="false">Free Tilt</button>
                <button class="mode-tab" type="button" data-mode="sides" role="tab" aria-selected="false">Warp (Sides)</button>
            </div>

            <section class="view-window" id="viewport" aria-label="Warp preview">
                <input class="file-input" type="file" id="focusUpload" accept="image/*" />
                <label class="frame-grid-snap warp-only" for="gridSnap">
                    <input type="checkbox" id="gridSnap" />
                    Grid Snap
                </label>
                <button id="clearBtn" class="clear-btn" type="button" hidden>Clear</button>
                <div id="viewPan">
                    <div id="viewZoom">
                        <img class="ref-image" id="refImg" alt="Reference" draggable="false" />

                        <svg id="grid-overlay" aria-hidden="true"></svg>

                        <div id="focus-container">
                            <img id="focusImg" alt="Focus" draggable="false" />
                            <div id="focusUploadPrompt" class="focus-upload-prompt" hidden>
                                <svg class="focus-upload-icon" viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M12 16V8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                    <path d="M8 12l4-4 4 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M5 18h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                </svg>
                                <span class="focus-upload-btn">Upload Image</span>
                            </div>
                        </div>

                        <div id="h0" class="handle" data-index="0" title="Top left"></div>
                        <div id="h1" class="handle" data-index="1" title="Top right"></div>
                        <div id="h2" class="handle" data-index="2" title="Bottom right"></div>
                        <div id="h3" class="handle" data-index="3" title="Bottom left"></div>
                        <div class="edge-handle" data-edge="top" title="Drag top edge"></div>
                        <div class="edge-handle" data-edge="right" title="Drag right edge"></div>
                        <div class="edge-handle" data-edge="bottom" title="Drag bottom edge"></div>
                        <div class="edge-handle" data-edge="left" title="Drag left edge"></div>
                        <div id="centerGrab" class="handle-center" title="Drag to move the whole focus quad"></div>

                        <svg id="tiltGizmo" class="tilt-gizmo" hidden aria-hidden="true">
                            <g id="tiltGizmoRoot">
                                <line id="tiltHorizonTop" class="tilt-horizon" />
                                <line id="tiltHorizonBottom" class="tilt-horizon" />
                                <g id="tiltPitchAxis" class="tilt-axis tilt-axis-pitch" data-tilt-axis="pitch" title="Drag up/down to tilt">
                                    <line id="tiltPitchLine" class="tilt-axis-line" />
                                    <polygon id="tiltPitchArrowTop" class="tilt-axis-line" fill="rgba(255,255,255,0.95)" stroke="none" />
                                    <polygon id="tiltPitchArrowBottom" class="tilt-axis-line" fill="rgba(255,255,255,0.95)" stroke="none" />
                                    <rect id="tiltPitchHit" class="tilt-hit-area" />
                                </g>
                                <g id="tiltYawAxis" class="tilt-axis tilt-axis-yaw" data-tilt-axis="yaw" title="Drag left/right to rotate">
                                    <path id="tiltYawArc" class="tilt-arc" />
                                    <polygon id="tiltYawArrowLeft" class="tilt-axis-line" fill="rgba(255,255,255,0.95)" stroke="none" />
                                    <polygon id="tiltYawArrowRight" class="tilt-axis-line" fill="rgba(255,255,255,0.95)" stroke="none" />
                                    <rect id="tiltYawHit" class="tilt-hit-area" />
                                </g>
                                <text id="tiltPitchLabel" class="tilt-angle-label">0°</text>
                                <text id="tiltYawLabel" class="tilt-angle-label">0°</text>
                            </g>
                        </svg>
                    </div>
                </div>
            </section>

            <section class="controls" aria-label="Warp controls">
                <div class="tilt-controls" aria-label="Free tilt controls">
                    <div class="tilt-control-row">
                        <label class="label" for="tiltPitchCtrl">Tilt</label>
                        <input class="range" type="range" id="tiltPitchCtrl" min="-78" max="78" step="1" value="0" />
                        <input class="tilt-angle-input" type="number" id="tiltPitchInput" min="-78" max="78" step="1" value="0" aria-label="Tilt degrees" />
                    </div>
                    <div class="tilt-control-row">
                        <label class="label" for="tiltYawCtrl">Rotate</label>
                        <input class="range" type="range" id="tiltYawCtrl" min="-78" max="78" step="1" value="0" />
                        <input class="tilt-angle-input" type="number" id="tiltYawInput" min="-78" max="78" step="1" value="0" aria-label="Rotate degrees" />
                    </div>
                </div>

                <div class="controls-pair-layout">
                    <div class="opacity-collapse" id="opacityCollapse" aria-hidden="true">
                        <div class="opacity-collapse-inner">
                            <div class="controls-pair-row opacity-row">
                                <div class="opacity-field">
                                    <label class="label" for="opacityCtrl">Focus Opacity</label>
                                    <div class="control-input-shell">
                                        <input class="range" type="range" id="opacityCtrl" min="0" max="1" step="0.01" value="0.72" />
                                    </div>
                                </div>
                                <div class="ref-upload-field">
                                    <span class="label">Reference Image:</span>
                                    <label class="upload-button" for="refUpload">
                                        <span class="upload-button-text">Upload</span>
                                    </label>
                                    <input class="file-input" type="file" id="refUpload" accept="image/*" />
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="control-row control-row-tools controls-pair-row">
                        <div class="ref-toggle-row">
                            <label class="label" for="refToggle">Background Ref</label>
                            <label class="toggle-switch" for="refToggle" title="Show background reference">
                                <input type="checkbox" id="refToggle" />
                                <span class="toggle-track" aria-hidden="true"></span>
                            </label>
                        </div>
                        <button id="resetBtn" class="button button-reset" type="button">Reset Position</button>
                    </div>
                </div>

                <div class="button-row">
                    <button id="addToDocumentBtn" class="button button-primary" type="button" disabled>Add to Canvas</button>
                </div>

                <details class="advanced-controls warp-only">
                    <summary>Corner coordinates (Precision Adjustments)</summary>
                    <div class="stats" aria-label="Warp values">
                        <label class="point-field">
                            <span class="point-label">TL</span>
                            <input class="coord-input" type="number" inputmode="numeric" data-index="0" data-axis="x" aria-label="Top left x" />
                            <input class="coord-input" type="number" inputmode="numeric" data-index="0" data-axis="y" aria-label="Top left y" />
                        </label>
                        <label class="point-field">
                            <span class="point-label">TR</span>
                            <input class="coord-input" type="number" inputmode="numeric" data-index="1" data-axis="x" aria-label="Top right x" />
                            <input class="coord-input" type="number" inputmode="numeric" data-index="1" data-axis="y" aria-label="Top right y" />
                        </label>
                        <label class="point-field">
                            <span class="point-label">BL</span>
                            <input class="coord-input" type="number" inputmode="numeric" data-index="3" data-axis="x" aria-label="Bottom left x" />
                            <input class="coord-input" type="number" inputmode="numeric" data-index="3" data-axis="y" aria-label="Bottom left y" />
                        </label>
                        <label class="point-field">
                            <span class="point-label">BR</span>
                            <input class="coord-input" type="number" inputmode="numeric" data-index="2" data-axis="x" aria-label="Bottom right x" />
                            <input class="coord-input" type="number" inputmode="numeric" data-index="2" data-axis="y" aria-label="Bottom right y" />
                        </label>
                    </div>
                </details>
            </section>
        </main>

        <script type="module" src="add-on-console-override.js"></script>
        <script type="module" src="index.js"></script>
    </body>
</html>
